- id: '1766834021191'
  alias: Gestion Chauffage ViCare
  description: Vitrocrossal 300
  triggers:
  - trigger: state
    entity_id: schedule.schedule_chauffage
  - trigger: state
    entity_id: zone.home
  - trigger: time_pattern
    minutes: /5
  - trigger: homeassistant
    event: start
  conditions:
  - condition: not
    conditions:
    - condition: state
      entity_id: climate.vitrocrossal_300_cu3a_heating
      state:
      - unavailable
      - unknown
  actions:
  - variables:
      is_someone_home: '{{ states(''zone.home'') | int(0) > 0 }}'
      is_schedule_on: '{{ is_state(''schedule.schedule_chauffage'', ''on'') }}'
      should_heat: '{{ is_someone_home and is_schedule_on }}'
      current_vicare_mode: '{{ state_attr(''climate.vitrocrossal_300_cu3a_heating'',
        ''active_vicare_mode'') }}'
  - choose:
    - conditions:
      - condition: template
        value_template: '{{ should_heat }}'
      sequence:
      - if:
        - condition: template
          value_template: '{{ current_vicare_mode != ''forcedNormal'' }}'
        then:
        - action: vicare.set_vicare_mode
          target:
            entity_id: climate.vitrocrossal_300_cu3a_heating
          data:
            vicare_mode: forcedNormal
        - action: notify.mobile_app_iphone_de_loic
          data:
            title: "\U0001F525 Chauffage Actif"
            message: Passage en CONFORT (forcedNormal).
    - conditions:
      - condition: template
        value_template: '{{ not should_heat }}'
      sequence:
      - if:
        - condition: template
          value_template: '{{ current_vicare_mode != ''forcedReduced'' }}'
        then:
        - action: vicare.set_vicare_mode
          target:
            entity_id: climate.vitrocrossal_300_cu3a_heating
          data:
            vicare_mode: forcedReduced
        - action: notify.mobile_app_iphone_de_loic
          data:
            title: "\U0001F331 Chauffage Eco"
            message: Passage en ÉCO (forcedReduced).
  mode: restart
