input_number:
  heating_chambre_sleep:
    name: Chauffage Chambre Sommeil
    min: 10
    max: 24
    step: 0.5
    unit_of_measurement: "°C"
    mode: box
    initial: 17

  heating_chambre_eco:
    name: Chauffage Chambre Eco
    min: 10
    max: 24
    step: 0.5
    unit_of_measurement: "°C"
    mode: box
    initial: 16

  heating_salon_day:
    name: Chauffage Salon Jour
    min: 10
    max: 24
    step: 0.5
    unit_of_measurement: "°C"
    mode: box
    initial: 19

  heating_salon_evening:
    name: Chauffage Salon Soir
    min: 10
    max: 24
    step: 0.5
    unit_of_measurement: "°C"
    mode: box
    initial: 19

  heating_salon_night:
    name: Chauffage Salon Nuit
    min: 10
    max: 24
    step: 0.5
    unit_of_measurement: "°C"
    mode: box
    initial: 17

  heating_salon_away:
    name: Chauffage Salon Absence
    min: 10
    max: 24
    step: 0.5
    unit_of_measurement: "°C"
    mode: box
    initial: 16

  hot_water_boost_restore_temp:
    name: Hot Water Boost Restore Temp
    min: 10
    max: 60
    step: 1
    unit_of_measurement: "°C"
    mode: box
    initial: 10

timer:
  hot_water_boost:
    name: Hot Water Boost
    duration: "01:00:00"

script:
  hot_water_boost_1h:
    alias: Hot Water Boost 1h
    mode: restart
    sequence:
      - if:
          - condition: state
            entity_id: timer.hot_water_boost
            state: idle
        then:
          - service: input_number.set_value
            target:
              entity_id: input_number.hot_water_boost_restore_temp
            data:
              value: >-
                {{
                  state_attr('water_heater.vitrocrossal_300_cu3a_domestic_hot_water', 'temperature')
                  | float(10)
                }}

      - service: water_heater.set_temperature
        target:
          entity_id: water_heater.vitrocrossal_300_cu3a_domestic_hot_water
        data:
          temperature: 55

      - service: timer.start
        target:
          entity_id: timer.hot_water_boost
        data:
          duration: "01:00:00"

      - service: notify.mobile_app_iphone_de_loic
        data:
          title: "🚿 Boost ECS"
          message: >-
            Boost eau chaude lancé pour 1h.
            Température forcée à 55°C.
            Retour prévu à
            {{ states('input_number.hot_water_boost_restore_temp') | int }}°C.

automation:
  - alias: Gestion Chauffage Intelligente ViCare
    id: gestion_chauffage_intelligente_vicare
    mode: restart
    trigger:
      - platform: state
        entity_id:
          - zone.home
          - schedule.schedule_chauffage_chambre
          - schedule.schedule_chauffage_salon
          - sensor.thermo_1_temperature
          - sensor.thermo_2
          - sensor.vitrocrossal_300_cu3a_outside_temperature
          - climate.thermostat1
      - platform: time_pattern
        minutes: "/5"
      - platform: homeassistant
        event: start

    condition:
      - condition: not
        conditions:
          - condition: state
            entity_id: climate.vitrocrossal_300_cu3a_heating
            state: unavailable
          - condition: state
            entity_id: climate.vitrocrossal_300_cu3a_heating
            state: unknown

    action:
      - variables:
          someone_home: "{{ states('zone.home') | int(0) > 0 }}"
          outside_temp: "{{ states('sensor.vitrocrossal_300_cu3a_outside_temperature') | float(0) }}"
          bedroom_temp_ok: "{{ states('sensor.thermo_1_temperature') not in ['unknown', 'unavailable', 'none', ''] }}"
          salon_temp_ok: "{{ states('sensor.thermo_2') not in ['unknown', 'unavailable', 'none', ''] }}"
          bedroom_temp: "{{ states('sensor.thermo_1_temperature') | float(0) }}"
          salon_temp: "{{ states('sensor.thermo_2') | float(0) }}"
          bedroom_schedule_on: "{{ is_state('schedule.schedule_chauffage_chambre', 'on') }}"
          salon_schedule_on: "{{ is_state('schedule.schedule_chauffage_salon', 'on') }}"
          vicare_mode_current: "{{ state_attr('climate.vitrocrossal_300_cu3a_heating', 'active_vicare_mode') }}"
          thermostat1_target_current: "{{ state_attr('climate.thermostat1', 'temperature') | float(0) }}"
          thermostat1_hvac_current: "{{ states('climate.thermostat1') }}"
          deadband: 0.3
          current_hour: "{{ now().hour + (now().minute / 60) }}"

          bedroom_target: >-
            {% if someone_home and bedroom_schedule_on %}
              {{ states('input_number.heating_chambre_sleep') | float(17) }}
            {% else %}
              {{ states('input_number.heating_chambre_eco') | float(16) }}
            {% endif %}

          salon_target: >-
            {% set h = now().hour + (now().minute / 60) %}
            {% if not someone_home %}
              {{ states('input_number.heating_salon_away') | float(16) }}
            {% elif salon_schedule_on %}
              {% if h >= 22 or h < 7 %}
                {{ states('input_number.heating_salon_night') | float(17) }}
              {% elif h >= 18 %}
                {{ states('input_number.heating_salon_evening') | float(19) }}
              {% else %}
                {{ states('input_number.heating_salon_day') | float(19) }}
              {% endif %}
            {% else %}
              {{ states('input_number.heating_salon_night') | float(17) }}
            {% endif %}

          bedroom_needs_heat: >-
            {{
              someone_home
              and bedroom_temp_ok
              and (bedroom_temp < (bedroom_target | float - deadband))
            }}

          salon_needs_heat: >-
            {{
              someone_home
              and salon_temp_ok
              and (salon_temp < (salon_target | float - deadband))
            }}

          any_room_needs_heat: "{{ bedroom_needs_heat or salon_needs_heat }}"
          desired_vicare_mode: "{{ 'forcedNormal' if any_room_needs_heat else 'dhw' }}"

      # 1. On pousse la bonne consigne sur le TRV de la chambre
      - if:
          - condition: template
            value_template: "{{ thermostat1_hvac_current != 'heat' }}"
        then:
          - service: climate.set_hvac_mode
            target:
              entity_id: climate.thermostat1
            data:
              hvac_mode: heat

      - if:
          - condition: template
            value_template: "{{ (thermostat1_target_current - (bedroom_target | float)) | abs > 0.2 }}"
        then:
          - service: climate.set_temperature
            target:
              entity_id: climate.thermostat1
            data:
              temperature: "{{ bedroom_target | float }}"

      # 2. Gestion chaudière
      # forcedNormal = chauffage actif
      # dhw = ECS seule, donc parfait quand aucune pièce ne demande du chauffage
      - choose:
          - conditions:
              - condition: template
                value_template: "{{ vicare_mode_current != desired_vicare_mode }}"
            sequence:
              - service: vicare.set_vicare_mode
                target:
                  entity_id: climate.vitrocrossal_300_cu3a_heating
                data:
                  vicare_mode: "{{ desired_vicare_mode }}"

              - service: notify.mobile_app_iphone_de_loic
                data:
                  title: >-
                    {% if not someone_home %}
                      🏠 Passage en absence
                    {% elif desired_vicare_mode == 'forcedNormal' and bedroom_needs_heat and salon_needs_heat %}
                      🔥 Chambre et salon trop froids
                    {% elif desired_vicare_mode == 'forcedNormal' and bedroom_needs_heat %}
                      🔥 Chambre trop froide
                    {% elif desired_vicare_mode == 'forcedNormal' and salon_needs_heat %}
                      🔥 Salon trop froid
                    {% elif desired_vicare_mode == 'forcedNormal' %}
                      🔥 Chauffage lancé
                    {% else %}
                      ✅ Température atteinte
                    {% endif %}
                  message: >-
                    {% if not someone_home %}
                      Plus personne n'est à la maison.
                      Passage en mode absence :
                      chauffage coupé, eau chaude conservée.

                    {% elif desired_vicare_mode == 'forcedNormal' and bedroom_needs_heat and salon_needs_heat %}
                      La chambre et le salon sont sous leur température cible.
                      Le chauffage démarre.

                    {% elif desired_vicare_mode == 'forcedNormal' and bedroom_needs_heat %}
                      La chambre est sous sa température cible.
                      Le chauffage démarre.

                    {% elif desired_vicare_mode == 'forcedNormal' and salon_needs_heat %}
                      Le salon est sous sa température cible.
                      Le chauffage démarre.

                    {% elif desired_vicare_mode == 'forcedNormal' %}
                      Une pièce a demandé du chauffage.
                      Le chauffage démarre.

                    {% else %}
                      Aucune pièce ne demande de chauffage.
                      On garde uniquement l'eau chaude sanitaire.
                    {% endif %}

                    Chambre : {{ bedroom_temp | round(1) }}°C / cible {{ bedroom_target | float | round(1) }}°C.
                    Salon : {{ salon_temp | round(1) }}°C / cible {{ salon_target | float | round(1) }}°C.
                    Extérieur : {{ outside_temp | round(1) }}°C.
                    
  - alias: Hot Water Boost End
    id: hot_water_boost_end
    mode: single
    trigger:
      - platform: event
        event_type: timer.finished
        event_data:
          entity_id: timer.hot_water_boost

      - platform: event
        event_type: timer.cancelled
        event_data:
          entity_id: timer.hot_water_boost

    action:
      - variables:
          restore_temp: "{{ states('input_number.hot_water_boost_restore_temp') | float(10) }}"

      - service: water_heater.set_temperature
        target:
          entity_id: water_heater.vitrocrossal_300_cu3a_domestic_hot_water
        data:
          temperature: "{{ restore_temp }}"

      - choose:
          - conditions:
              - condition: template
                value_template: "{{ trigger.event.event_type == 'timer.finished' }}"
            sequence:
              - service: notify.mobile_app_iphone_de_loic
                data:
                  title: "♨️ Boost ECS terminé"
                  message: "Retour de la cible ECS à {{ restore_temp }}°C."

          - conditions:
              - condition: template
                value_template: "{{ trigger.event.event_type == 'timer.cancelled' }}"
            sequence:
              - service: notify.mobile_app_iphone_de_loic
                data:
                  title: "🛑 Boost ECS annulé"
                  message: "Boost stoppé manuellement. Retour de la cible ECS à {{ restore_temp }}°C."