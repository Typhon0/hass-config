room_section_header:
  show_icon: false
  show_state: false
  show_label: false
  tap_action:
    action: none
  hold_action:
    action: none
  styles:
    grid:
      - grid-template-areas: '"n chev" "meta chev"'
      - grid-template-columns: 1fr min-content
      - grid-template-rows: min-content min-content
      - column-gap: 0.8vw
      - row-gap: 0.15vw
    card:
      - background: transparent
      - box-shadow: none
      - border: none
      - border-radius: 0
      - padding: 0 0 0.5vw 0
      - margin: 0
      - overflow: visible
    name:
      - justify-self: start
      - align-self: end
      - font-size: clamp(34px, 3.1vw, 50px)
      - line-height: 0.98
      - letter-spacing: -0.055em
      - font-weight: 760
      - color: rgba(255,255,255,0.96)
      - text-shadow: 0 1px 10px rgba(0,0,0,0.16)
    custom_fields:
      meta:
        - justify-self: start
        - align-self: start
        - font-size: 0.9vw
        - font-weight: 520
        - letter-spacing: -0.02em
        - color: rgba(186,191,198,0.58)
      chev:
        - justify-self: end
        - align-self: center
        - color: rgba(255,255,255,0.26)
        - width: 1.3vw
        - height: 1.3vw
        - padding-top: 0.35vw
  custom_fields:
    meta: >
      [[[ return variables.subtitle || ''; ]]]
    chev: >
      [[[ return '<ha-icon icon="mdi:chevron-right"></ha-icon>'; ]]]
