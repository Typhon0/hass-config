sidebar_weather:
  triggers_update:
    - weather.maison
  show_icon: false
  show_name: false
  show_state: false
  tap_action:
    action: more-info
  hold_action:
    action: none
  styles:
    grid:
      - grid-template-areas: '"main"'
      - grid-template-columns: 1fr
      - grid-template-rows: min-content
    card:
      - padding: 1.2rem 1.25rem
      - border-radius: 28px
      - background: rgba(12, 12, 14, 0.52)
      - border: 1px solid rgba(255,255,255,0.06)
      - backdrop-filter: blur(18px)
      - -webkit-backdrop-filter: blur(18px)
      - box-shadow: inset 0 1px 0 rgba(255,255,255,0.04)
      - overflow: hidden
    custom_fields:
      main:
        - justify-self: stretch
        - align-self: stretch
  custom_fields:
    main: >
      [[[
        if (!entity) return '<div class="wx-empty">Météo indisponible</div>';

        const s = entity.state || '';
        const a = entity.attributes || {};
        const temp = a.temperature !== undefined ? `${Math.round(a.temperature * 10) / 10} °C` : '—';
        const hum = a.humidity !== undefined ? `${a.humidity}% hum.` : '';
        const wind = a.wind_speed !== undefined ? `${Math.round(a.wind_speed)} ${a.wind_speed_unit || ''}`.trim() : '';

        const icons = {
          'clear-night': 'mdi:weather-night',
          'cloudy': 'mdi:weather-cloudy',
          'exceptional': 'mdi:alert-circle-outline',
          'fog': 'mdi:weather-fog',
          'hail': 'mdi:weather-hail',
          'lightning': 'mdi:weather-lightning',
          'lightning-rainy': 'mdi:weather-lightning-rainy',
          'partlycloudy': 'mdi:weather-partly-cloudy',
          'pouring': 'mdi:weather-pouring',
          'rainy': 'mdi:weather-rainy',
          'snowy': 'mdi:weather-snowy',
          'snowy-rainy': 'mdi:weather-snowy-rainy',
          'sunny': 'mdi:weather-sunny',
          'windy': 'mdi:weather-windy',
          'windy-variant': 'mdi:weather-windy-variant'
        };

        const labels = {
          'clear-night': 'Nuit claire',
          'cloudy': 'Nuageux',
          'exceptional': 'Alerte',
          'fog': 'Brume',
          'hail': 'Grêle',
          'lightning': 'Orage',
          'lightning-rainy': 'Orageux',
          'partlycloudy': 'Éclaircies',
          'pouring': 'Pluie forte',
          'rainy': 'Pluie',
          'snowy': 'Neige',
          'snowy-rainy': 'Neige & pluie',
          'sunny': 'Ensoleillé',
          'windy': 'Venteux',
          'windy-variant': 'Venteux'
        };

        const accent = ['sunny'].includes(s)
          ? '#ffd84f'
          : ['rainy', 'pouring', 'lightning-rainy', 'snowy-rainy'].includes(s)
            ? '#8ab9ff'
            : ['clear-night'].includes(s)
              ? '#d9ddff'
              : '#e7ebf2';

        const icon = icons[s] || 'mdi:weather-partly-cloudy';
        const label = labels[s] || s || 'Météo';

        return `
          <div class="wx-wrap">
            <div class="wx-top">
              <div class="wx-icon" style="color:${accent};"><ha-icon icon="${icon}"></ha-icon></div>
              <div class="wx-copy">
                <div class="wx-state">${label}</div>
                <div class="wx-temp">${temp}</div>
              </div>
            </div>
            <div class="wx-bottom">
              ${hum ? `<span>${hum}</span>` : ''}
              ${wind ? `<span>${wind}</span>` : ''}
            </div>
          </div>
        `;
      ]]]
  extra_styles: |
    .wx-wrap {
      display: grid;
      gap: 0.7rem;
    }

    .wx-top {
      display: grid;
      grid-template-columns: auto 1fr;
      align-items: center;
      gap: 0.95rem;
    }

    .wx-icon {
      width: 3.1rem;
      height: 3.1rem;
      display: grid;
      place-items: center;
      border-radius: 50%;
      background: rgba(255,255,255,0.06);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.05);
    }

    .wx-icon ha-icon {
      --mdc-icon-size: 1.55rem;
    }

    .wx-state {
      font-size: 1.55rem;
      line-height: 1.05;
      font-weight: 700;
      color: rgba(255,255,255,0.94);
    }

    .wx-temp {
      font-size: 1.05rem;
      line-height: 1.12;
      font-weight: 540;
      color: rgba(224,228,235,0.86);
      margin-top: 0.22rem;
    }

    .wx-bottom {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    .wx-bottom span {
      display: inline-flex;
      align-items: center;
      min-height: 1.9rem;
      padding: 0 0.75rem;
      border-radius: 999px;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.05);
      color: rgba(224,228,235,0.82);
      font-size: 0.82rem;
      font-weight: 650;
    }

    .wx-empty {
      color: rgba(224,228,235,0.76);
      font-size: 0.95rem;
      font-weight: 600;
    }
