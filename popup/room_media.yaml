action: fire-dom-event
browser_mod:
  service: browser_mod.popup
  data:
    title: Média
    size: wide
    content:
      type: vertical-stack
      cards:
        - type: markdown
          content: |
            # Média
            Sources, lecture et raccourcis audio/vidéo
          card_mod:
            style: |
              ha-card {
                background: transparent;
                box-shadow: none;
                border: none;
                padding: 10px 8px 2px;
                margin: 0 0 6px 0;
              }
              ha-markdown {
                color: rgba(255,255,255,0.96);
              }
              h1 {
                margin: 0 0 4px 0;
                font-size: 2rem;
                line-height: 1.05;
                font-weight: 700;
              }
              p {
                margin: 0;
                color: rgba(255,255,255,0.62);
                font-size: 0.98rem;
              }
        - type: grid
          columns: 4
          square: false
          card_mod:
            style: |
              #root {
                gap: 18px !important;
                padding: 4px 0 2px 0 !important;
              }
              ha-card {
                background: transparent !important;
                box-shadow: none !important;
                border: none !important;
              }
          cards:
            - type: custom:button-card
              entity: sensor.jellyfin_playing
              name: Dernier lu
              tap_action:
                action: none
              template:
                - conditional_media
                - icon_jellyfin
            - type: custom:button-card
              entity: media_player.samsungtv_qn90a
              name: Salon
              template:
                - media
                - icon_apple_tv
            - type: custom:button-card
              entity: media_player.cuisine
              name: Chambre
              template:
                - media
                - icon_apple_tv
            - type: custom:button-card
              entity: media_player.spotify
              name: Spotify
              template:
                - media
                - icon_spotify
            - type: custom:button-card
              entity: media_player.kok
              name: Nest Mini
              template:
                - media
                - icon_nest_mini
        - type: entities
          title: Détails média
          show_header_toggle: false
          entities:
            - entity: sensor.jellyfin_playing
              name: Dernier lu
            - entity: media_player.samsungtv_qn90a
              name: TV Salon
            - entity: media_player.cuisine
              name: TV Chambre
            - entity: media_player.spotify
              name: Spotify
            - entity: media_player.kok
              name: Nest Mini
          card_mod:
            style: |
              ha-card {
                margin-top: 22px;
                border-radius: 26px;
                background: rgba(255,255,255,0.04);
                border: 1px solid rgba(255,255,255,0.06);
                box-shadow: none;
                overflow: hidden;
              }
              .card-header {
                font-size: 1rem;
                font-weight: 600;
                color: rgba(255,255,255,0.9);
              }
