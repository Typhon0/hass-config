action: fire-dom-event
browser_mod:
  service: browser_mod.popup
  data:
    title: Chambre
    size: wide
    content:
      type: vertical-stack
      cards:
        - type: markdown
          content: |
            # Chambre
            Éclairage, température, clim et purifier
          card_mod:
            style: |
              ha-card {
                background: transparent;
                box-shadow: none;
                border: none;
                padding: 10px 8px 2px;
                margin: 0 0 6px 0;
              }
              ha-markdown {
                color: rgba(255,255,255,0.96);
              }
              h1 {
                margin: 0 0 4px 0;
                font-size: 2rem;
                line-height: 1.05;
                font-weight: 700;
              }
              p {
                margin: 0;
                color: rgba(255,255,255,0.62);
                font-size: 0.98rem;
              }
        - type: grid
          columns: 4
          square: false
          card_mod:
            style: |
              #root {
                gap: 18px !important;
                padding: 4px 0 2px 0 !important;
              }
              ha-card {
                background: transparent !important;
                box-shadow: none !important;
                border: none !important;
              }
          cards:
            - type: custom:button-card
              entity: light.mibedsidelamp2
              name: Lampe de chevet
              template:
                - light
                - icon_lamp
              tap_action:
                action: toggle
              double_tap_action:
                action: more-info
            - type: custom:button-card
              entity: sensor.thermo_1_temperature
              name: Température
              template:
                - base
                - circle
                - icon_climate
              tap_action:
                action: more-info
            - type: custom:button-card
              entity: climate.forceclima
              name: Clim
              template:
                - base
                - circle
                - icon_fan2
              tap_action:
                action: more-info
              variables:
                circle_input: >
                  [[[ 
                    if (entity) {
                      return entity.state === 'cool' ? entity.attributes.temperature : entity.attributes.current_temperature;
                    }
                  ]]]
                circle_input_unit: "°C"
            - type: custom:button-card
              entity: fan.chambre
              name: Dyson Purifier
              template:
                - base
                - circle
                - icon_fan2
              tap_action:
                action: more-info
              variables:
                circle_input: >
                  [[[ 
                    if (entity) {
                      return entity.state === 'on' ? entity.attributes.percentage : '';
                    }
                  ]]]
                circle_input_unit: "%"
        - type: entities
          title: Détails chambre
          show_header_toggle: false
          entities:
            - entity: light.mibedsidelamp2
              name: Lampe de chevet
            - entity: sensor.thermo_1_temperature
              name: Température
            - entity: climate.forceclima
              name: Clim
            - entity: fan.chambre
              name: Dyson Purifier
          card_mod:
            style: |
              ha-card {
                margin-top: 22px;
                border-radius: 26px;
                background: rgba(255,255,255,0.04);
                border: 1px solid rgba(255,255,255,0.06);
                box-shadow: none;
                overflow: hidden;
              }
              .card-header {
                font-size: 1rem;
                font-weight: 600;
                color: rgba(255,255,255,0.9);
              }
