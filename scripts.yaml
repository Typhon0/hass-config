lancer_le_mode_console:
  alias: Lancer le Mode Console
  description: Allume le PC, la TV Samsung, bascule sur la session Console et lance
    l'interface de jeu.
  icon: mdi:gamepad-variant-outline
  mode: single
  sequence:
  - action: media_player.turn_on
    data: {}
  - data:
      mac: 2C:F0:5D:E3:29:75
    action: wake_on_lan.send_magic_packet
  - data:
      source: HDMI
    action: media_player.select_source
    target:
      entity_id: media_player.samsung_tv_remote
  - wait_for_trigger:
    - entity_id:
      - device_tracker.pc_loic_5
      to: Active
      trigger: state
    timeout:
      minutes: 2
  - action: button.press
    data: {}
    target:
      entity_id: button.pc_loic_pc_set_console_flag
  - delay:
      seconds: 2
  - action: button.press
    data: {}
    target:
      entity_id: button.pc_loic_restart
  - wait_for_trigger:
    - entity_id: sensor.ton_pc_hass_agent_status
      to: Active
      trigger: state
    timeout:
      minutes: 2
  - delay:
      seconds: 10
  - action: button.press
    data: {}
    target:
      entity_id: button.pc_loic_pc_switch_to_tv
boost_eau_chaude_2_douches:
  alias: Boost eau chaude (2 douches)
  sequence:
  - action: input_boolean.turn_on
    data: {}
    target:
      entity_id: input_boolean.boost_eau_chaude_douche
  - action: vicare.set_vicare_mode
    target:
      entity_id: climate.vitrocrossal_300_cu3a_heating
    data:
      vicare_mode: dhw
  - action: notify.mobile_app_iphone_de_loic
    data:
      title: Boost ECS actif
      message: Eau chaude forcee pour 40 minutes.
  - action: notify.mobile_app_iphone_de_emma
    data:
      title: Boost ECS actif
      message: Eau chaude forcee pour 40 minutes.
    enabled: false
  - delay:
      hours: 0
      minutes: 40
      seconds: 0
  - action: input_boolean.turn_off
    data: {}
    target:
      entity_id: input_boolean.boost_eau_chaude_douche
  - action: notify.mobile_app_iphone_de_loic
    data:
      title: Boost ECS termine
      message: Fin du forcage. L'automatisation principale reprend la main.
  - action: notify.mobile_app_iphone_de_emma
    data:
      title: Boost ECS termine
      message: Fin du forcage. L'automatisation principale reprend la main.
    enabled: false
  mode: single
  description: ''
